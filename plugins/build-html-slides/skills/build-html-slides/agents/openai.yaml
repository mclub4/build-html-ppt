interface:
  display_name: "HTML Presentation Builder"
  short_description: "Create art-directed HTML decks with notes, WebP assets, and visual QA"
  default_prompt: >-
    Use $build-html-slides to create or revise an audience-routed, art-directed HTML presentation with sibling Markdown presenter notes and a hash-bound sources.json cache. For a new deck, obtain an explicit Quick Draft or Full Validation choice; for an ordinary revision, use Edit Only unless new assurance is requested. Quick Draft is creation-only: create the deliverables and stop without check_environment.py, dependency installation, Chromium rendering, deterministic validation, AI visual review, quality scoring, or cross-review, then disclose that the deck was not rendered or validated. Full Validation alone runs check_environment.py, asks before installing any missing tool, prefers install_browser_dependencies.py --consent after approval, and uses validate_all.py for prepare, verify, finalize-prepare, and finalize-verify.

    Treat slide 1 as the highest-priority art-direction decision: write a cover brief, compare at least two directions in planning, make the literal subject and opening promise recognizable within roughly three seconds, use the strongest accurate visual, and reject generic title panels or merely acceptable covers. Choose topic- and language-appropriate display/body fonts proactively; do not ship the neutral shell stack unchanged, request undeclared weights, synthesize Korean bold, or neutralize strong/b emphasis. Treat technology as a subject domain rather than a dark-console theme: compare paper-led, authentic-media, and operational candidates, then use near-black surfaces, neon status accents, mono micro-labels, glowing nodes, and diagonal panels only when operations, monitoring, incidents, security, or authentic brand identity justify them. In Full Validation, treat rendered line composition as geometry: block one- or two-character Korean final lines, stranded punctuation, colliding glyph rows, sibling text overlap, opaque visual occlusion, and navigation-covered captions before vision.

    Unless the user explicitly requests pure HTML, no photography, or a typography/diagram-only treatment, perform bounded discovery for relevant sourced photography or factual imagery before settling the storyboard; use it when it adds identification, evidence, context, scale, stakes, atmosphere, or rhythm, and omit it when it adds no information. Classify the subject's media job semantically: physical industries, products, facilities, experiments, organisms, tissue, and medical or laboratory phenomena need sourced real-world or scientific visual anchors alongside charts and diagrams; Full Validation must not turn them into image-starved reports. When available, automatically use humanize-korean for settled Korean copy and bundled archify for qualified architecture, topology, workflow, sequence, data-flow, lifecycle, or complex-flow visuals without asking again; never install missing companions without consent. Do not knowingly deliver visible placeholders, PLACE NOTE labels, dummy assets, empty media promises, generic replacement graphics, blurry thumbnails, prior upscales, or heavily compressed rasters. Quick Draft provides no assurance that these defects were detected.

    In Full Validation, treat rendered pixels as truth: never synthesize PASS records or override reviewer FAIL, and inspect cross-layer collisions, subject occupancy, and image sharpness rather than bounds alone. Retain normal, short, and true browser-page-scale zoom150 evidence, block vision on deterministic failures, batch at most four slides per vision call, and add tablet/mobile only when requested. Automatically route named-character/person markup and subject metadata to identity review, require separate authoritative local WebP references recorded in sources.json, and compare pixels rather than labels. Preserve the template's visualViewport-aware 1280x720 stage and icon-based previous/page-input/total/next/fullscreen controls.

    For Full Validation edits, use --slides and a change-type hint; trust the typed classifier to refresh only affected slides for copy/image/local-CSS changes, include neighbors only for structural or adjacency-sensitive changes, and use full-deck scope for shared CSS/runtime changes. After failure, rerun only implicated checks and slides while preserving valid independent cross-reviews for unchanged capture hashes; do not mistake intentional independent cross-validation for duplicate machine work. For 20-25 slides, plan Full Validation for 40-90 minutes, freeze broad image research early, score once after the deck settles, and complete only the generated risk-based final cross-review batches with current capture hashes.
