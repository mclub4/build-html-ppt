<meta charset="utf-8">
<title>Image escaping its card</title>
<style>
  html, body { margin: 0; padding: 0; background: #10131a; }
  .stage { position: relative; width: 1280px; height: 720px; overflow: hidden; }
  .slide {
    position: absolute; inset: 0; display: flex; visibility: hidden;
    overflow: hidden; isolation: isolate; background: #10131a;
  }
  .slide.active { visibility: visible; }
  .slide-media { position: absolute; inset: 0; z-index: 0; overflow: hidden; }
  .slide-content {
    position: relative; z-index: 2; display: flex; flex: 1;
    min-width: 0; min-height: 0; padding: 56px 64px; gap: 40px;
  }
  .card {
    position: relative; border: 1px solid #2c3444; border-radius: 18px;
    background: #171c26; display: flex; align-items: center; justify-content: center;
  }
</style>
<div class="stage">
  <section class="slide active" data-title="Image escaping its card">
    <div class="slide-content" style="display:block;padding:0">
      <div class="card" style="position:absolute;left:200px;top:200px;width:400px;height:260px">
        <img src="imggeom-subject-1200x800.png" alt="Escaping detail" data-media-purpose="subject"
             style="position:absolute;left:-60px;top:-40px;width:520px;height:340px;object-fit:contain">
      </div>
      <div class="card" style="position:absolute;left:760px;top:200px;width:400px;height:260px">
        <img src="imggeom-subject-1200x800.png" alt="Contained detail" data-media-purpose="subject"
             style="position:absolute;left:20px;top:20px;width:358px;height:218px;object-fit:contain">
      </div>
    </div>
  </section>
</div>
