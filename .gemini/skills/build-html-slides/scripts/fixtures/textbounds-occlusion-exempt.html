<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>textbounds occlusion exemption</title>
<style>
  @font-face {
    font-family: "Fixture Sans";
    src: url("inter-latin-400-normal.woff2") format("woff2");
    font-weight: 400;
    font-style: normal;
  }
  *, *::before, *::after { box-sizing: border-box; font-synthesis: none; }
  html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #0d0d0f; }
  .stage-wrap { position: fixed; inset: 0; overflow: hidden; }
  .stage { position: absolute; left: 0; top: 0; width: 1280px; height: 720px; transform-origin: top left; }
  .slide {
    position: absolute; inset: 0; display: none; overflow: hidden; isolation: isolate;
    background: #f2efe7; color: #121214; font-family: "Fixture Sans", sans-serif; font-weight: 400;
  }
  .slide.active { display: block; }
  .headline {
    position: absolute; left: 96px; top: 108px; width: 900px; margin: 0; z-index: 1;
    font-size: 92px; font-weight: 400; line-height: 1.16; text-align: right;
  }
  .lede {
    position: absolute; left: 294px; top: 470px; margin: 0; z-index: 1;
    font-size: 40px; line-height: 1.4; white-space: nowrap;
  }
  .art { position: absolute; left: 96px; top: 452px; width: 204px; height: 140px; z-index: 3; }
</style>
</head>
<body>
  <div class="stage-wrap">
    <main class="stage" id="stage">
      <section class="slide active" data-title="textbounds occlusion exemption">
        <h1 class="headline">Ink, not points,<br>tells the truth</h1>
        <img class="art" src="textbounds-tile-320x220.png" alt="Solid measurement tile">
        <p class="lede" data-occlusion-ok>Every rule a machine can check must be measured</p>
      </section>
    </main>
  </div>
  <script>
    (() => {
      const stage = document.getElementById('stage');
      const fit = () => {
        const width = document.documentElement.clientWidth;
        const height = document.documentElement.clientHeight;
        const scale = Math.min(width / 1280, height / 720);
        stage.style.transform = `scale(${scale})`;
        stage.style.left = `${Math.max(0, (width - 1280 * scale) / 2)}px`;
        stage.style.top = `${Math.max(0, (height - 720 * scale) / 2)}px`;
      };
      addEventListener('resize', fit);
      fit();
    })();
  </script>
</body>
</html>
