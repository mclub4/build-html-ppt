interface:
  display_name: "HTML Presentation Builder"
  short_description: "Create art-directed HTML decks with notes, WebP assets, and visual QA"
  default_prompt: >-
    Use $build-html-slides to create or revise an audience-routed, art-directed HTML presentation with sibling Markdown presenter notes and a hash-bound sources.json cache. Before starting a new presentation, resolve the intended audience and validation mode together in one opening question when either is missing. In Korean, label the modes 빠른 검증 (Quick Draft) and 정밀 검증 (Full Validation). Require an explicit mode choice; when the user delegates the audience with "청중은 알아서 해줘", assume a general company-wide concept-sharing audience with mixed domain familiarity. For an ordinary revision, use Edit Only unless new assurance is requested. Quick Draft remains creation-only despite its Korean label: create the deliverables and stop without check_environment.py, dependency installation, Chromium rendering, deterministic validation, AI visual review, quality scoring, or cross-review, then disclose that the presentation was not rendered or validated. Keep Quick Draft authoring bounded: copy the runtime shell, freeze shared tokens once, use four or five reusable composition families, reserve bespoke CSS for the cover, closing, and at most two signature slides, keep notes concise, and do not build every slide as an independent CSS system. Every large-area non-neutral color needs palette provenance from the subject, authentic media, brand identity, semantic status, or deliberate editorial pacing; unsupported high-chroma colors remain small accents rather than one-off full-slide resets. Full Validation alone runs check_environment.py, asks before installing any missing tool, prefers install_browser_dependencies.py --consent after approval, and uses validate_all.py for prepare, verify, finalize-prepare, and finalize-verify.

    Treat slide 1 as the highest-priority art-direction decision: write a cover brief, compare at least two directions in planning, make the literal subject and opening promise recognizable within roughly three seconds, use the strongest accurate visual, and reject generic title panels or merely acceptable covers. Choose topic- and language-appropriate display/body fonts proactively; do not ship the neutral shell stack unchanged, request undeclared weights, synthesize Korean bold, neutralize strong/b emphasis, or use one safe sans with nearly identical texture for every role. Treat technology as a subject domain rather than an automatic dark-console or pale-report theme: compare an evidence-led schematic direction, a contemporary editorial or constructive-geometric direction, and an authentic-media or interface direction when appropriate. Both dark-led and paper-led systems remain valid when the full brief supports them; reject only automatic topic-noun routing and repetitive template fingerprints. Paper Systems is a candidate, not the automatic correction for dark consoles. Reject repeated top-headline-plus-two/three/four-panel skeletons, different card counts presented as rhythm, and generic framed panels dominating more than roughly one third of ordinary body slides. Record a distinctive motif, visible type-role contrast, and information-native composition families before implementation. In Full Validation, treat rendered line composition as geometry: block one- or two-character Korean final lines, stranded punctuation, colliding glyph rows, sibling text overlap, opaque visual occlusion, and navigation-covered captions before vision.

    Unless the user explicitly requests pure HTML, no photography, or a typography/diagram-only treatment, perform bounded discovery for relevant sourced photography or factual imagery before settling the storyboard; use it when it adds identification, evidence, context, scale, stakes, atmosphere, or rhythm, and omit it when it adds no information. Classify the subject's media job semantically: physical industries, products, facilities, experiments, organisms, tissue, and medical or laboratory phenomena need sourced real-world or scientific visual anchors alongside charts and diagrams; Full Validation must not turn them into image-starved reports. Model the audience's terminology burden semantically. At the first meaningful occurrence, add one short plain-language note only for an unfamiliar acronym, entity, market, regulation, product, or internal shorthand needed to understand the claim; omit notes for terms the named audience knows, terms already explained, and incidental names. Mark it with data-term-note, keep it at caption scale in a content-sized inline annotation or micro-note rail, and never render it as a large white card, tall footer panel, or glossary band. Mark source lines with data-source-citation and keep the two physically separate. Treat shared runtime/footer classes as reserved; namespace slide components and never combine the generic .source citation class with a component class. Do not use a static parser, invent acronym expansions, repeat definitions, or turn slides into glossaries. When available, automatically use humanize-korean for settled Korean copy and bundled archify for qualified architecture, topology, workflow, sequence, data-flow, lifecycle, or complex-flow visuals without asking again; never install missing companions without consent. Do not knowingly deliver visible placeholders, PLACE NOTE labels, dummy assets, empty media promises, generic replacement graphics, blurry thumbnails, prior upscales, or heavily compressed rasters. Quick Draft provides no assurance that these defects were detected.

    In Full Validation, treat rendered pixels as truth: never synthesize PASS records or override reviewer FAIL, and inspect cross-layer collisions, subject occupancy, and image sharpness rather than bounds alone. Retain normal, short, and true browser-page-scale zoom150 evidence, block vision on deterministic failures, batch at most four slides per vision call, and add tablet/mobile only when requested. Automatically route named-character/person markup and subject metadata to identity review, require separate authoritative local WebP references recorded in sources.json, and compare pixels rather than labels. Preserve the template's visualViewport-aware 1280x720 stage and icon-based previous/page-input/total/next/fullscreen controls.

    For Full Validation edits, use --slides and a change-type hint; trust the typed classifier to refresh only affected slides for copy/image/local-CSS changes, include neighbors only for structural or adjacency-sensitive changes, and use full-deck scope for shared CSS/runtime changes. After failure, rerun only implicated checks and slides while preserving valid independent cross-reviews for unchanged capture hashes; do not mistake intentional independent cross-validation for duplicate machine work. When many sourced images represent distinct existing products, artworks, people, characters, places, interfaces, or evidence items, use high-volume-media-workflow.md: freeze a private roster, apply a lightweight label/source/pixel gate, acquire in parallel, review up to twelve labeled candidates per build_media_contact_sheet.js sheet, and deep-research only flagged candidates. Candidate sheets do not replace full-size slide crop and occlusion review. For 20-25 slides, plan Full Validation for 40-90 minutes, freeze broad image research early, score once after the deck settles, and complete only the generated risk-based final cross-review batches with current capture hashes.
