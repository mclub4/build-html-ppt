# GENERATED FILE - do not edit by hand.
# Source: SKILL.md + scripts/validation_contract.json
# Regenerate: python3 scripts/generate_openai_agent.py
interface:
  display_name: "HTML Presentation Builder"
  short_description: "Create art-directed HTML decks with notes, WebP assets, and visual QA"
  default_prompt: |-
    Use $build-html-slides for every HTML slide deck, keynote-style HTML page, or revision of one.
    SKILL.md is the contract; load it and follow its Reading Plan, opening each reference at the
    moment its decision arrives rather than all of them up front.

    INTAKE. Resolve two intake fields before researching, drafting, creating files, or generating assets: intended audience and validation mode. Ask every unresolved intake question together in one opening message.
    - Edit Only: an ordinary revision where the user wants a change, not new assurance. Make the edit; create no render or validation pass.
    - 빠른 검증 (Quick Draft): the user prioritizes iteration, exploration, a first usable version, or the shortest turnaround. Despite the user-facing name, this is a creation-only mode with no rendered validation.
    - 정밀 검증 (Full Validation): the output is for real delivery, publication, or a consequential decision, or strong assurance was requested. Render every slide at the canonical profiles, inspect every slide's `normal` capture with AI, route stress profiles to AI only for visual-critical or automation-warning slides, score the settled deck once, and use the bundled independent reviewer subagents.

    BUDGET. Full Validation: 70 minutes for a 20-25 slide deck. Quick Draft: 15 minutes. These are ceilings.
    - At 25 minutes elapsed, or 40 media candidates, whichever comes first — freeze the media set.
    - At 45 minutes elapsed, if `--phase prepare` has not yet passed — cut scope, in this fixed order: drop remaining optional atmosphere imagery and ship those slides type-led; stop all design-candidate comparison and commit to the current theme contract; restrict sourcing to the existing cache (`source_cache.py --update` only, no new research); reduce the deck to the slides that carry the argument.
    - At 60 minutes elapsed — no new review rounds.
    - Quick Draft at 8 minutes — freeze media and stop discovery.
    - Checkpoints act autonomously. Do not ask the user at a checkpoint: asking costs time it cannot recover and is skipped entirely in a non-interactive run.

    FULL VALIDATION PHASES, in order, all through validate_all.py: Preflight, prepare, primary review dispatch, verify, finalize-prepare, final review dispatch, finalize-verify.
    Full Validation review is performed by two bundled subagents, invoked with the Task tool. The authoring agent never writes its own review verdict; leaving dispatch implicit is exactly what produces self-authored review records.
    - `build-html-slides-visual-reviewer` — primary and cross-review inspection of full-size captures.
    - `build-html-slides-quality-editor` — one final pass: squint review, the single quality score, the weakest slides, and the pending `cross_review_batches`.
    - Independence: every cross-reviewer's `reviewer_ref` must be outside the complete primary-reviewer set, not merely different from the primary reviewer of that slide.
    - Transcribe reviewer output with record_review.py and nothing else: it never creates a verdict,
      so never bulk-fill records, synthesize a PASS observation, or overwrite a reviewer FAIL.
    - Each review_scope owns an exact ordered check tuple from validation_contract.json: all (12), text (4), image (5), navigation (1).
      Read it from that file or from --status; never type a tuple from memory.

    MEASURED, NOT ARGUED. Gates inside --phase prepare, before any capture reaches a reviewer: Container containment; Hero prominence; Subject prominence; Text collision; Nav exclusion zone; Container density; Contrast; Slide variety.
    `references/reviewer-gates.md` is the authority for every threshold, message string, and escape hatch; `scripts/validation_contract.json` is the machine authority. Do not restate a number from either here or in a review observation.
    - `data-media-purpose` is authoritative; `.slide-media` membership means nothing to the classifier.
    - Keep footer notes, sources, logos, and captions out of the navigation zone at authoring time.
    - Every escape hatch is an author declaration, not a reviewer opinion, and the slide still needs a visual verdict that says why the exception is legitimate.
    - A warned slide enters the refute-or-confirm pass in references/reviewer-gates.md: open its
      slide-NN-debug.png boundary overlay and open the observation with CONFIRM: or REFUTE: naming
      an element and a coordinate. Generic approval does not close a warning.

    RULES NO GATE CAN MEASURE.
    - Separate private authoring constraints from audience-facing copy.
    - Every large-area non-neutral color needs a palette provenance: subject or media-derived, authentic brand identity, semantic status, or deliberate editorial pacing.
    - Slide 1 is the highest-priority art-direction decision: it must establish the literal subject, opening promise, and visual tone within roughly three seconds.
    - Declare `--font-display`, `--font-body`, and `--font-mono` from the language, subject, audience, and room, with visible role contrast through family, width, weight, scale, or serif/sans tension.
    - Technology is a subject domain, not a visual theme.
    - Plan each meaningful visual as evidence, identity, mechanism, concept, or atmosphere, and require a contribution beyond repeating the headline.
    - Read `references/asset-discovery.md` before searching a named person, group, brand, product, released game, event, institution, place, or project.
    - Availability is sufficient consent to use a companion whose routing rule matches.
    - Bundled distributions include `archify` as an independent sibling skill.
    - A shared-CSS or runtime edit after `--phase finalize-prepare` changes every capture hash and discards the entire independent primary review, which must then be re-dispatched from phase 2.

    For Edit Only, explicitly state that no new render or validation was run. Never present old evidence as current.
