name: CI

on:
  push:
    branches: ['**']
  pull_request:

# A second push to the same ref cancels the older run; the newest commit is the
# only one whose result matters.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: check + tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Node dependencies
        run: npm ci

      # render_slides.js resolves Playwright through scripts/playwright_loader.js,
      # which finds the `playwright` package installed above; only the browser
      # binary and its system libraries still need to be provisioned.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # Repository validation: four-copy tree equality, version assertions,
      # licence propagation, and documentation contracts.
      - name: Validate repository
        run: npm run check

      - name: Verify browser preflight
        run: npm run check:browser

      # Full discovery rather than test:unit + test:e2e, because those two
      # scripts enumerate modules by hand and a newly added test_*.py would
      # otherwise never run in CI.
      - name: Run the test suite
        run: npm test

      # Guards against the source tree being edited without re-running
      # scripts/sync-distributions.sh, and against tests writing into the tree.
      - name: Assert the working tree is unchanged
        run: git diff --exit-code
