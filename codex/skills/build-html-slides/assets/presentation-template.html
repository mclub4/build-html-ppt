:root{--bg:#090b16;--panel:#11172b;--line:#293454;--ink:#f4f7ff;--muted:#9eabc8;--accent:#63e6ff;--accent2:#b28cff;--gold:#ffd166}*{box-sizing:border-box}html,body{height:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--ink);font-family:"Pretendard","Noto Sans KR","Malgun Gothic",system-ui,sans-serif}button,input{font:inherit}.stage-wrap{position:fixed;inset:0;display:grid;place-items:center}.stage{position:relative;width:1280px;height:720px;transform-origin:center}.slide{position:absolute;inset:0;display:flex;flex-direction:column;padding:56px 64px 76px;overflow:hidden;visibility:hidden;opacity:0;transform:translateX(28px) scale(.99);transition:opacity .4s ease,transform .4s ease,visibility .4s;background:linear-gradient(145deg,#12172b,#090b17);border:1px solid var(--line);border-radius:18px;isolation:isolate}.slide.active{visibility:visible;opacity:1;transform:none;z-index:1}.slide-media{position:absolute;inset:0;z-index:0;pointer-events:none}.slide-content{position:relative;z-index:2;display:flex;flex:1;min-height:0;flex-direction:column}.key-visual,.logo,.title-art,.safe-media{max-width:100%;max-height:100%;object-fit:contain}.visual-frame{position:absolute;inset:0;overflow:hidden;z-index:0}.visual-backdrop{width:100%;height:100%;object-fit:cover;filter:blur(18px) brightness(.55) saturate(1.1);transform:scale(1.06)}.body{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:center}.lead{align-items:center;text-align:center;justify-content:center}.eyebrow{align-self:flex-start;margin-bottom:14px;padding:6px 12px;border:1px solid #63e6ff55;border-radius:999px;color:var(--accent);font-size:14px;letter-spacing:.12em;text-transform:uppercase}.lead .eyebrow{align-self:center}h1{max-width:1100px;margin:0 0 20px;font-size:52px;line-height:1.12;letter-spacing:-.035em}h2{margin:0 0 10px;color:var(--accent);font-size:25px}p{font-size:20px;line-height:1.52}.lede{max-width:920px;margin:0;color:var(--muted);font-size:25px}.accent{color:var(--accent)}.grid{display:grid;gap:18px}.cols-3{grid-template-columns:repeat(3,1fr)}.card{padding:22px 24px;border:1px solid var(--line);border-radius:16px;background:#141c32}.card p{margin:0;color:var(--muted);font-size:17px}.metric{font-size:58px;font-weight:800;color:var(--gold);font-variant-numeric:tabular-nums}.nav{position:fixed;right:14px;bottom:14px;z-index:10;height:48px;display:flex;align-items:center;gap:5px;padding:5px 7px;border:1px solid var(--line);border-radius:16px;background:#0d1224ed}.nav button{width:36px;height:36px;border:1px solid var(--line);border-radius:11px;background:#18213b;color:var(--accent);cursor:pointer;display:grid;place-items:center}.nav button:focus-visible,.page-input:focus-visible{outline:3px solid var(--gold);outline-offset:2px}.nav button:disabled{opacity:.35}.nav-title{max-width:110px;overflow:hidden;color:var(--muted);font-size:11px;text-overflow:ellipsis;white-space:nowrap}.count{height:36px;display:flex;align-items:center;gap:4px;min-width:66px;justify-content:center;font-size:14px;font-weight:700;font-variant-numeric:tabular-nums}.page-input{width:32px;height:32px;padding:0;border:1px solid #ffffff25;border-radius:8px;background:#ffffff0b;color:var(--accent);font-size:14px;font-weight:800;text-align:center;font-variant-numeric:tabular-nums}.progress{position:fixed;top:0;left:0;z-index:20;width:0;height:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .35s}.edge{position:fixed;top:0;bottom:0;z-index:5;width:9%;cursor:pointer}.edge.left{left:0}.edge.right{right:0}.hint{position:fixed;right:20px;top:18px;z-index:10;color:var(--muted);font-size:12px}@media(prefers-reduced-motion:reduce){*,*::before,*::after{transition-duration:.01ms!important;animation-duration:.01ms!important}}@media print{html,body{overflow:visible}.stage-wrap{position:static;display:block}.stage{width:1280px;height:auto;transform:none!important}.slide{position:relative;visibility:visible;opacity:1;transform:none;width:1280px;height:720px;page-break-after:always}.nav,.edge,.hint,.progress{display:none}}
</style><style>.stage-wrap{display:block;overflow:hidden}.stage{position:absolute;transform-origin:top left}.nav{--nav-surface:#0d1224f2;--nav-border:#63e6ff38;--nav-ink:var(--ink);--nav-muted:var(--muted);--nav-accent:var(--accent);--nav-hover:#63e6ff16;min-width:0;height:48px;gap:2px;padding:5px 6px;border:1px solid var(--nav-border);border-radius:18px;background:var(--nav-surface);box-shadow:0 12px 36px #0005;backdrop-filter:blur(14px)}.nav button{width:36px;height:36px;padding:0;border:0;border-radius:10px;background:transparent;color:var(--nav-accent);display:grid;place-items:center}.nav button:hover{background:var(--nav-hover)}.nav button:disabled{color:var(--nav-muted);opacity:.32}.nav button svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}.count{height:36px;min-width:76px;display:grid;grid-template-columns:32px 10px 26px;place-items:center;align-items:center;gap:2px;color:var(--nav-muted)}.page-input,.page-separator,.page-total{height:32px;margin:0;padding:0;align-self:center;line-height:1;font-variant-numeric:tabular-nums}.page-input{width:32px;border:0;border-radius:8px;background:transparent;color:var(--nav-accent);font:800 14px/32px system-ui,-apple-system,"Segoe UI",sans-serif;text-align:center;appearance:textfield}.page-input::-webkit-inner-spin-button,.page-input::-webkit-outer-spin-button{margin:0;appearance:none}.page-input:hover,.page-input:focus{background:var(--nav-hover)}.page-separator,.page-total{width:100%;display:grid;place-items:center;font-size:14px;font-weight:800}.page-total{color:var(--nav-ink)}@media print{.stage{position:relative;left:auto!important;top:auto!important}}</style></head><body><div class="progress" id="progress"></div><div class="stage-wrap"><main class="stage" id="stage" aria-live="polite">
<section class="slide lead active" data-title="시작"><div class="slide-media" aria-hidden="true"></div><div class="slide-content"><span class="eyebrow">Presentation</span><div class="body"><h1>한 문장으로 꽂히는<br><span class="accent">프레젠테이션 제목</span></h1><p class="lede">발표의 맥락과 청중이 얻을 핵심 가치를 짧게 적습니다.</p></div></div></section>
<section class="slide" data-title="핵심 포인트"><div class="slide-media" aria-hidden="true"></div><div class="slide-content"><span class="eyebrow">Key ideas</span><h1>세 가지 포인트로<br>메시지를 구조화합니다</h1><div class="body"><div class="grid cols-3"><article class="card"><div class="metric">01</div><h2>맥락</h2><p>왜 지금 중요한지 설명합니다.</p></article><article class="card"><div class="metric">02</div><h2>핵심</h2><p>주장과 근거를 연결합니다.</p></article><article class="card"><div class="metric">03</div><h2>행동</h2><p>기억할 다음 행동을 남깁니다.</p></article></div></div></div></section>
<section class="slide lead" data-title="마무리"><div class="slide-media" aria-hidden="true"></div><div class="slide-content"><span class="eyebrow">Takeaway</span><div class="body"><h1>마지막에는 하나의<br><span class="accent">선명한 결론</span>만 남깁니다</h1><p class="lede">질문, 연락처 또는 다음 행동을 배치하세요.</p></div></div></section>
</main></div><div class="edge left" id="edgeLeft" aria-hidden="true"></div><div class="edge right" id="edgeRight" aria-hidden="true"></div><nav class="nav" aria-label="슬라이드 탐색"><button id="prev" aria-label="이전 슬라이드" title="이전 슬라이드"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 5-7 7 7 7"/></svg></button><label class="count"><input class="page-input" id="pageInput" type="number" min="1" value="1" inputmode="numeric" aria-label="이동할 슬라이드 번호"><span class="page-separator" aria-hidden="true">/</span><span class="page-total" id="total">3</span></label><button id="next" aria-label="다음 슬라이드" title="다음 슬라이드"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 5 7 7-7 7"/></svg></button><button id="full" aria-label="전체 화면" title="전체 화면"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 3H3v5M16 3h5v5M3 16v5h5M21 16v5h-5"/></svg></button></nav><div class="hint">← → / Space 이동 · F 전체화면 · P 페이지 입력</div><script>
(()=>{const stage=document.getElementById('stage'),slides=[...stage.querySelectorAll('.slide')],N=slides.length;let index=0;const pageInput=document.getElementById('pageInput'),total=document.getElementById('total'),prev=document.getElementById('prev'),next=document.getElementById('next'),progress=document.getElementById('progress');pageInput.max=N;const viewportSize=()=>{const v=window.visualViewport;return{width:v?.width||document.documentElement.clientWidth,height:v?.height||document.documentElement.clientHeight}};const fit=()=>{const{width,height}=viewportSize(),scale=Math.min(width/1280,height/720);stage.style.left=`${Math.max(0,(width-1280*scale)/2)}px`;stage.style.top=`${Math.max(0,(height-720*scale)/2)}px`;stage.style.transform=`scale(${scale})`};const show=n=>{index=Math.max(0,Math.min(N-1,n));slides.forEach((slide,i)=>{const active=i===index;slide.classList.toggle('active',active);slide.setAttribute('aria-hidden',String(!active))});pageInput.value=index+1;total.textContent=N;progress.style.width=`${(index+1)/N*100}%`;prev.disabled=index===0;next.disabled=index===N-1;if(location.hash!==`#${index+1}`)history.replaceState(null,'',`#${index+1}`)};const go=()=>{const n=parseInt(pageInput.value,10);Number.isFinite(n)?show(n-1):(pageInput.value=index+1)};prev.onclick=()=>show(index-1);next.onclick=()=>show(index+1);edgeLeft.onclick=()=>show(index-1);edgeRight.onclick=()=>show(index+1);pageInput.onfocus=()=>pageInput.select();pageInput.onchange=go;pageInput.onkeydown=e=>{e.stopPropagation();if(e.key==='Enter'){go();pageInput.blur()}};full.onclick=()=>document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen();addEventListener('keydown',e=>{if(/INPUT|TEXTAREA|SELECT/.test(document.activeElement.tagName)||document.activeElement.isContentEditable)return;if(['ArrowRight','ArrowDown','PageDown',' '].includes(e.key)){e.preventDefault();show(index+1)}if(['ArrowLeft','ArrowUp','PageUp'].includes(e.key)){e.preventDefault();show(index-1)}if(e.key==='Home')show(0);if(e.key==='End')show(N-1);if(e.key.toLowerCase()==='f')full.click();if(e.key.toLowerCase()==='p'){pageInput.focus();pageInput.select()}});addEventListener('resize',fit);addEventListener('orientationchange',fit);window.visualViewport?.addEventListener('resize',fit);window.visualViewport?.addEventListener('scroll',fit);addEventListener('hashchange',()=>show((parseInt(location.hash.slice(1),10)||1)-1));fit();show((parseInt(location.hash.slice(1),10)||1)-1)})();
</script></body></html>
