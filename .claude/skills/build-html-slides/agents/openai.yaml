interface:
  display_name: "HTML Presentation Builder"
  short_description: "Create art-directed HTML decks with notes, WebP assets, and visual QA"
  default_prompt: "Use $build-html-slides to create or revise an audience-routed, art-directed HTML presentation with sibling Markdown presenter notes and a hash-bound sources.json cache. For a new deck, obtain an explicit Quick Draft or Full Validation choice; for an ordinary revision, use Edit Only unless new assurance is requested. Before either rendered mode, run check_environment.py and ask before installing any missing tool. Use validate_all.py as the canonical prepare, verify, and finalize entrypoint. Choose topic- and language-appropriate display/body fonts proactively; do not ship the neutral shell stack unchanged. When installed, automatically use humanize-korean for settled Korean copy and drawio-skill for qualified architecture, ERD, UML, sequence, topology, or complex-flow visuals; never install missing companions or draw.io/Graphviz without consent. Reject every visible placeholder, PLACE NOTE label, dummy asset, empty media promise, or generic replacement graphic before delivery, and record completion separately from crop/content match. Retain normal, short, and true browser-page-scale zoom150 evidence, block vision on deterministic failures, batch at most four slides per vision call, and add tablet/mobile only when requested. Automatically route named-character/person markup and subject metadata to identity review, require separate authoritative local WebP references recorded in sources.json, and compare pixels rather than labels. Preserve the template's visualViewport-aware 1280x720 stage and icon-based previous/page-input/total/next/fullscreen controls. Use --slides and the narrow change type after edits; slide-local CSS remains incremental while shared runtime/style changes rerender all. For 20-25 slides, plan Full Validation for 40-90 minutes, freeze broad image research early, score once after the deck settles, and cross-review only required critical slides."
